# nginx site configuration for Vellum.
#
# Mounts the Vellum web app (running in a Docker container at
# 127.0.0.1:5001) under https://YOUR_HOST:8443/vellum/.
#
# Place this file at /etc/nginx/sites-enabled/vellum.conf (Debian-style)
# or /etc/nginx/conf.d/vellum.conf (RHEL-style), then run:
#
#     nginx -t && systemctl reload nginx
#
# Substitute YOUR_HOST with your actual server name (e.g.
# far-far-away.mooo.com) before reloading.
#
# Required Vellum-side configuration for this to work end-to-end:
#   * The Docker container must run with TRUST_PROXY=1 in its
#     environment so Flask honors X-Forwarded-{For,Proto,Host,Prefix}.
#     See docker/docker-compose.yml.
#   * The Flask app must use ProxyFix(..., x_prefix=1) and the form
#     template must use url_for('convert') so URLs include the
#     /vellum/ prefix. Both already done in src/.

upstream vellum_app {
    server 127.0.0.1:5001;
    keepalive 32;
}

# --- Disabled upstreams (kept commented for reference / future use) ---
#upstream rozhlas_app {
#    server 127.0.0.1:5004;
#    keepalive 32;
#}
#
#upstream app2 {
#    server 127.0.0.1:5005;
#    keepalive 32;
#}
#
#upstream app3 {
#    server 127.0.0.1:5006;
#    keepalive 32;
#}

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name YOUR_HOST;

    # SSL certificate (Let's Encrypt or your CA of choice).
    ssl_certificate     /etc/letsencrypt/live/YOUR_HOST/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_HOST/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Edge security headers. The Vellum app sets its own CSP, X-Frame-
    # Options, etc. on every response, but HSTS belongs at the TLS
    # terminator (here) so it's always present even if the app fails.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/vellum.access.log;
    error_log  /var/log/nginx/vellum.error.log;

    # Vellum web app — forward everything under /vellum/ to the
    # container on 127.0.0.1:5001.
    location /vellum/ {
        proxy_pass http://vellum_app/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        # Tell Flask which URL prefix it's mounted at. ProxyFix in app.py
        # reads this and uses it as SCRIPT_NAME so url_for() generates
        # correct /vellum/... URLs.
        proxy_set_header X-Forwarded-Prefix /vellum;

        # PDF uploads can be up to ~50 MB (the app's MAX_CONTENT_LENGTH
        # is 50 MiB). nginx defaults to 1 MB which would block every
        # real upload. 60M leaves a small headroom for multipart
        # boundaries.
        client_max_body_size 60M;

        # PDF conversions can take a while — bigger documents through
        # tesseract OCR easily exceed nginx's default 60 s read timeout.
        # 5 min covers any realistic single-file conversion.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass_request_body    on;
        proxy_pass_request_headers on;
    }

    # --- Disabled apps (kept commented for reference / future use) ---
    #location /skr/ {
    #    proxy_pass http://rozhlas_app/;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto https;
    #    proxy_set_header X-Forwarded-Prefix /skr;
    #    proxy_pass_request_body on;
    #    proxy_pass_request_headers on;
    #}
    #
    #location /app2/ {
    #    proxy_pass http://app2/;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto https;
    #    proxy_set_header X-Forwarded-Prefix /app2;
    #    proxy_pass_request_body on;
    #    proxy_pass_request_headers on;
    #}
    #
    #location /app3/ {
    #    proxy_pass http://app3/;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto https;
    #    proxy_set_header X-Forwarded-Prefix /app3;
    #    proxy_pass_request_body on;
    #    proxy_pass_request_headers on;
    #}

    # Handle /vellum without trailing slash → redirect to /vellum/
    location = /vellum {
        return 301 https://$server_name:8443/vellum/;
    }

    # Disabled exact-path redirects:
    #location = /skr  { return 301 https://$server_name:8443/skr/;  }
    #location = /app2 { return 301 https://$server_name:8443/app2/; }
    #location = /app3 { return 301 https://$server_name:8443/app3/; }

    # Root → /vellum/
    location = / {
        return 301 https://$server_name:8443/vellum/;
    }
}
