name: Build Windows release

# Triggers:
#   * push to a tag matching v*  (e.g. v1.0.0) — typically created by
#     `make git-release` from a clean working tree.
#   * workflow_dispatch — manual button in the Actions tab, useful for
#     testing the build without cutting a real release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  # Needed by softprops/action-gh-release to create the GitHub Release.
  contents: write

jobs:
  build-windows:
    name: Build Vellum on windows-latest
    runs-on: windows-latest
    defaults:
      run:
        # Bash is preinstalled on windows-latest runners (Git Bash) and
        # uses the same backslash continuation syntax as Linux/macOS,
        # which keeps the build command identical to the local
        # build-windows/Dockerfile invocation.
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          # Reuse the Windows-specific requirements file from the local
          # Wine build (pdf2docx, PyMuPDF, python-docx). The numpy<2.0
          # pin in there is harmless on real Windows — it was a Wine
          # workaround for the missing ucrtbase.crealf symbol.
          pip install -r build-windows/requirements-windows.txt
          pip install pyinstaller

      - name: Show versions (sanity check + log artifact)
        run: |
          python --version
          pip show pyinstaller pdf2docx PyMuPDF python-docx | grep -E '^(Name|Version):'

      - name: Build with PyInstaller
        # Same flags as build-windows/Dockerfile so the GH-built artifact
        # matches what `./build-windows/build.sh` produces locally.
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --noupx \
            --windowed \
            --name PDF-to-DOCX \
            --paths src \
            --collect-all pdf2docx \
            --collect-all fitz \
            --collect-all docx \
            --exclude-module IPython \
            --exclude-module jupyter \
            --exclude-module notebook \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module pandas \
            --exclude-module pytest \
            --exclude-module _pytest \
            --exclude-module sphinx \
            --exclude-module pylint \
            --exclude-module setuptools \
            --exclude-module pip \
            --exclude-module wheel \
            --exclude-module babel \
            --exclude-module tkinter.test \
            --exclude-module numpy.distutils \
            --exclude-module numpy.f2py \
            --exclude-module numpy.testing \
            --exclude-module numpy.tests \
            src/gui.py

      - name: Show built artifacts
        run: |
          ls -la dist/PDF-to-DOCX | head -20
          du -sh dist/PDF-to-DOCX

      - name: Sign Windows .exe (when WINDOWS_CERT_PFX secret is set)
        # Signs PDF-to-DOCX.exe with a code-signing certificate
        # provided via GitHub Secrets, so Windows SmartScreen /
        # Defender stops calling it an "unknown publisher" binary.
        # Gracefully skips when the secret is not configured — the
        # build still produces an unsigned .exe in that case.
        #
        # NOTE on Vellum's actual setup: Vellum uses Certum Open
        # Source Code Signing, which (post the June 2023 CA/B Forum
        # rules) requires the private key to live in hardware /
        # cloud HSM and is therefore NOT available as a downloadable
        # PFX. The PFX path here is kept as a fallback for forks that
        # use a different CA, an older cert, or a self-signed cert
        # for closed-circle distribution. For the Certum-OSS path,
        # leave this secret unset — the build runs unsigned, and the
        # release artifact is signed locally on a maintainer's
        # Windows machine before being uploaded to the GitHub
        # Release. See README.md "Code signing — Certum Open Source
        # Code Signing" for the full Certum walkthrough.
        #
        # To enable PFX-based signing instead:
        #   WINDOWS_CERT_PFX       — base64 of your .pfx file
        #                            (`base64 -w0 mycert.pfx | pbcopy` on macOS)
        #   WINDOWS_CERT_PASSWORD  — the .pfx export password
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX }}
          PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:PFX_BASE64) {
            Write-Host "::notice::WINDOWS_CERT_PFX secret not set — skipping code signing."
            Write-Host "        The .exe in this build will be unsigned and will trigger"
            Write-Host "        SmartScreen / Defender warnings on end users' machines."
            Write-Host "        See README.md 'Code signing' to enable."
            exit 0
          }

          # Decode the base64 PFX into a temp file outside the repo.
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))

          # Locate the newest signtool.exe shipped with the Windows SDK
          # on the runner image. Path varies by SDK version, so glob it.
          $signtool = Get-ChildItem `
            "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" `
            -ErrorAction Stop |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Using signtool: $signtool"

          # Sign with SHA-256 + RFC3161 timestamp from Sectigo
          # (free, well-known TSA). Without a timestamp, the signature
          # would expire when the cert does.
          & $signtool sign `
            /f $pfxPath `
            /p $env:PFX_PASSWORD `
            /tr http://timestamp.sectigo.com `
            /td sha256 `
            /fd sha256 `
            /d "Vellum — PDF to DOCX Converter" `
            /du "https://github.com/om0wt/vellum" `
            dist/PDF-to-DOCX/PDF-to-DOCX.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed" }

          # Verify the signature is valid and the timestamp is present.
          & $signtool verify /pa /v dist/PDF-to-DOCX/PDF-to-DOCX.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed" }

          # Wipe the temp PFX. Secrets shouldn't outlive the step that
          # uses them, even on a single-use runner.
          Remove-Item $pfxPath -Force
          Write-Host "::notice::PDF-to-DOCX.exe signed and verified."

      - name: Determine release name
        id: rel
        run: |
          # Use the tag name on tag pushes (e.g. v1.0.0); for manual
          # dispatch fall back to a short SHA so the artifact name is
          # always meaningful.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_NAME="${GITHUB_REF#refs/tags/}"
          else
            REF_NAME="dev-${GITHUB_SHA::7}"
          fi
          echo "ref_name=${REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_name=Vellum-PDF-to-DOCX-${REF_NAME}-windows.zip" >> "$GITHUB_OUTPUT"

      - name: Zip the dist folder
        # PowerShell's Compress-Archive is the simplest way to make a
        # real .zip on the windows-latest runner. The bash `zip` is
        # also available but Compress-Archive avoids any path-quoting
        # surprises.
        shell: pwsh
        run: |
          Compress-Archive -Path dist/PDF-to-DOCX -DestinationPath ${{ steps.rel.outputs.zip_name }}
          Get-Item ${{ steps.rel.outputs.zip_name }} | Format-List Name,Length

      - name: Upload artifact (always — even for manual dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rel.outputs.zip_name }}
          path: ${{ steps.rel.outputs.zip_name }}
          retention-days: 30

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rel.outputs.zip_name }}
          generate_release_notes: true
          name: Vellum ${{ steps.rel.outputs.ref_name }}
          body: |
            Vellum **${{ steps.rel.outputs.ref_name }}** — Windows build.

            Download `${{ steps.rel.outputs.zip_name }}` below, extract
            it, and double-click `PDF-to-DOCX.exe` inside the
            `PDF-to-DOCX/` folder.

            For OCR support on Windows, install Tesseract separately
            from <https://github.com/UB-Mannheim/tesseract/wiki>. The
            app will detect it on PATH and unlock the OCR option.
