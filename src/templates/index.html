<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_codename }} — PDF to DOCX</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 4rem auto;
      padding: 0 1rem;
      color: #222;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    p.lead { color: #666; margin-top: 0; }
    form {
      margin-top: 2rem;
      padding: 1.5rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
    }
    label.field { display: block; margin-bottom: 1.25rem; font-weight: 500; }
    input[type=file] {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }
    label.checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1.25rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #7BA79D;
      color: white;
      border: 0;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #6a958c; }
    button:disabled { background: #aaa; cursor: wait; }
    footer { margin-top: 2rem; font-size: 0.8rem; color: #999; text-align: center; }
  </style>
</head>
<body>
  <h1>PDF to DOCX converter</h1>
  <p class="lead">Upload a PDF and download an editable Word document.</p>

  <form action="/convert" method="post" enctype="multipart/form-data" id="form">
    <label class="field">
      PDF file
      <input type="file" name="pdf" accept="application/pdf" required>
    </label>

    {% if tesseract_langs %}
    <label class="checkbox">
      <input type="checkbox" name="ocr" id="ocr">
      Apply OCR (for scanned PDFs)
    </label>
    <label class="checkbox" id="ocr-lang-row" style="margin-left: 1.5rem;">
      OCR language:
      <select name="ocr_language" id="ocr-lang-select" disabled>
        {% for code in tesseract_langs %}
          <option value="{{ code }}"{% if code == 'eng' %} selected{% endif %}>{{ code }}</option>
        {% endfor %}
      </select>
    </label>
    {% endif %}

    <label class="checkbox">
      <input type="checkbox" name="no_stream_tables" checked>
      Detect only tables with visible borders (recommended)
    </label>

    <button type="submit" id="btn">Convert</button>
  </form>

  <footer>
    Max upload size: 50 MB
    <br>
    {{ app_codename }} v{{ app_version }} ({{ app_release_date }}) — by {{ app_author }}
  </footer>

  <script>
    // Disable the button on submit so the user can't double-click
    // during a long conversion.
    document.getElementById('form').addEventListener('submit', function () {
      var btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Converting…';
    });

    // Enable/disable the OCR language select to mirror the OCR checkbox.
    var ocrCheckbox = document.getElementById('ocr');
    var ocrSelect = document.getElementById('ocr-lang-select');
    if (ocrCheckbox && ocrSelect) {
      ocrCheckbox.addEventListener('change', function () {
        ocrSelect.disabled = !ocrCheckbox.checked;
      });
    }
  </script>
</body>
</html>
